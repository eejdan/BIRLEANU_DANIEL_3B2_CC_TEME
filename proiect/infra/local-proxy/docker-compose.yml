services:
  focusflow-local-proxy:
    image: nginx:1.27-alpine
    container_name: focusflow-local-proxy
    restart: unless-stopped
    ports:
      - "${PROXY_PORT:-80}:80"
    environment:
      LOCAL_DOMAIN: ${LOCAL_DOMAIN:-focusflow.local}
      FRONTEND_UPSTREAM: ${FRONTEND_UPSTREAM:-host.docker.internal:8081}
      AUTH_UPSTREAM: ${AUTH_UPSTREAM:-host.docker.internal:3001}
      CALENDAR_UPSTREAM: ${CALENDAR_UPSTREAM:-host.docker.internal:3000}
      RECOMMENDATIONS_UPSTREAM: ${RECOMMENDATIONS_UPSTREAM:-host.docker.internal:3002}
      BILLING_UPSTREAM: ${BILLING_UPSTREAM:-host.docker.internal:3003}
      ADVERTISING_UPSTREAM: ${ADVERTISING_UPSTREAM:-host.docker.internal:3004}
    volumes:
      - ./nginx/default.conf.template:/etc/nginx/templates/default.conf.template:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"

